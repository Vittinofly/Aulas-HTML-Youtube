<!DOCTYPE html>
<!--doctype informa ao agente de usuário a versão do html que deve ser renderizada-->
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <title>Pagina de exemplo estrutura básica</title>
        <meta name='author' content='Victor Hugo'>
        <meta name='description' content='Pagina de exemplo estrutura básica'>
    </head>

    <style>
        p, li{
            font-family: sans-serif;
            color: green;
        }
        a{
            font-family: sans-serif;
            color: red;
        }
        a:hover{
            color: pink;
            background-color: black;
        }
        a:visited{
            color: yellow;
        }
        a:active{
            color: blue;
        }

        ul li{
            list-style-type: square;
        }

        ol li{
            list-style-type: upper-roman;
        }

    </style>
    <body>
        <a href="01 - teste.html">veja o arquivo01 - teste</a>
        <a href="02 - tags.html">Veja o arquivo02 - tags</a>
        
        <ul>
            <li>item 1</li>
            <li>item 2</li>
            <li>item 3</li>
        </ul>

        <ol>
            <li>item 1</li>
            <li>item 2</li>
            <li>item 3</li>
        </ol>

        <p>Paragrafo 1</p>
    </body>
</html>
